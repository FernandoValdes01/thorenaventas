# Thorena Ventas - Documentacion de Base de Datos
# Proposito: guia simple para migrar localStorage/seed a base de datos.

[objetivo]
persistir_todo = true
evitar_colisiones_codigo_pedido = true
canales_venta = terreno,online,oficina
tarifa_ciudad = aplicada_en_terreno_online_oficina
regla_oficina = despacho_0_por_ciento

[enums]
sale_channel = terreno,online,oficina
order_status = Cotizado,Pedido,Preparando,Despachado,Pagado,Pendiente,Anulado
client_status = Activo,Inactivo
visit_frequency = Semanal,Quincenal,Mensual
dispatch_status = Pendiente,Preparando,Despachado,Pagado,Anulado
payment_method_general = Efectivo,Transferencia,Debito/Credito,Credito 7 dias,Credito 15 dias
payment_method_oficina = Efectivo,Debito,Credito,Transferencia

[tablas_principales]
1 = clients
2 = products
3 = orders
4 = order_items
5 = volume_scales
6 = city_rates
7 = payment_methods
8 = sales
9 = routes
10 = purchases
11 = suppliers
12 = cobranzas

[tabla.clients]
pk = id (string: CLI-xxx o CLI-NATURAL)
campos = name,type,rut,phone,contact,email,address,zone,sector,frequency,status,credit_enabled,debt,monthly_target,accumulated_sales,goal_progress,credit_limit,whatsapp,instagram,notes,observations,last_purchase
notas = mantener_cliente_natural_como_registro_especial

[clients.tipos_negocio_detectados]
tipos = Negocio fijo,Mayorista,Minorista,Distribuidor,Cafeteria,Restaurant,Camping,Cabanas,Hotel/Hostal,Food Truck,Minimarket,Provisiones,Panaderia,Pasteleria,Botilleria,Cliente natural

[tabla.products]
pk = id/sku
campos = sku,name/product,category,brand,unit,barcode,stock,stock_min,base_price,purchase_cost,transport_unit,final_cost,sale_price_base,unit_profit,margin_pct,iva,location,status
ofertas = offer_mode,offer_discount_percent,offer_end_date
categorias_detectadas = Higiene,Bebidas,Alimentos,Combustible,Limpieza,Otros

[tabla.orders]
pk = id (uuid recomendado)
unique = code (PED-xxxx)
campos = code,created_at,sale_channel,status,client_id,customer_name,customer_rut,customer_number,contact_phone,delivery_address,payment_method,observations,seller_name,seller_rut,subtotal_before_discount,total_discount_amount,items_total,dispatch_city,dispatch_rate,dispatch_surcharge,total,show_receipt
snapshot_cliente = client_type_snapshot,zone_snapshot,sector_snapshot,debt_snapshot
reglas = generar_PED_solo_al_crear_pedido;oficina_nace_pagado

[tabla.order_items]
pk = id
fk = order_id -> orders.id
campos = product_id,product_name_snapshot,quantity,base_price,offer_discount_percent,unit_price_before_scale,unit_price,volume_scale_id,volume_scale_label,volume_discount_rate,volume_discount_percent,subtotal_before_scale,discount_amount,subtotal
validacion = quantity_mayor_igual_1

[tabla.volume_scales]
pk = id
campos = label,min_quantity,max_quantity,discount_rate,objective,comment,active
validacion = discount_rate_entre_0_y_0_95

[tabla.city_rates]
pk = id
unique = city
campos = city,rate,active
semilla = Villarrica:0;Pucon:0.025;Conaripe:0.05;Lican Ray:0.03;Pitrufquen:0.07;Nancul:0.04;Curarrehue:0.06
reglas = villarrica_0;oficina_siempre_0

[tabla.payment_methods]
pk = id
campos = name,channel_scope,active
nota = opcional_tabla_puente_payment_method_channels

[tabla.suppliers]
pk = id
campos = name,contact,phone,email,status,notes

[tabla.purchases]
pk = id
campos = date,supplier_id_o_nombre,purchase_order,sku,product,quantity,unit_cost,transport_unit,total_cost,reception,doc,observation

[tabla.routes]
pk = id
campos = date,zone,sector,seller,visited_clients,clients_with_order,sales,effectiveness_pct,km_route,fuel,observation

[tabla.sales]
pk = id
campos = date,client,zone,sector,seller,order_code,product,sale,cost,profit,margin_pct,payment_method,dispatch_status

[tabla.cobranzas]
pk = id
campos = client_name,document,issue_date,due_date,amount,paid_amount,balance,status,notes

[relaciones]
clients_1_n_orders = true
orders_1_n_order_items = true
products_1_n_order_items = true
volume_scales_1_n_order_items = true
suppliers_1_n_purchases = recomendado

[indices_recomendados]
orders_code_unique = true
orders_created_at = true
orders_status = true
orders_sale_channel = true
orders_client_id = true
order_items_order_id = true
order_items_product_id = true
clients_name = true
clients_zone = true
clients_status = true
products_sku_unique = true
city_rates_city_unique = true

[validaciones_criticas]
montos_mayor_igual_0 = true
dispatch_rate_entre_0_y_0_95 = true
discount_rate_entre_0_y_0_95 = true
formula_total = total = items_total + dispatch_surcharge
formula_descuento = total_discount_amount = subtotal_before_discount - items_total

[plan_migracion]
fase_1 = tablas_maestras_clients_products_scales_city_rates_payment_methods
fase_2 = transaccional_orders_order_items
fase_3 = erp_complementario_sales_routes_purchases_suppliers_cobranzas
fase_4 = generacion_transaccional_codigo_PED_para_concurrencia

[fuente_actual_sistema]
seeds = src/data/erpSeed.js,src/data/erpModulesSeed.js
normalizacion = src/App.jsx (normalizeOrder, normalizeItems, loadClients)
ventas = src/components/SalesView.jsx
erp = src/components/ERPView.jsx
